kind = "web"
previewPath = "/"
title = "PDF Viewer"
version = "1.0.0"
id = "artifacts/pdf-viewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25163

[services.development]
run = "pnpm --filter @workspace/pdf-viewer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-viewer", "run", "build" ]
publicDir = "artifacts/pdf-viewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25163"
BASE_PATH = "/"
