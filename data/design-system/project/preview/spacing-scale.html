<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:18px 22px;}
  h4{font:var(--overline);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px;}
  .rows{display:flex;flex-direction:column;gap:9px;}
  .r{display:flex;align-items:center;gap:14px;}
  .r .k{width:104px;font:var(--caption);color:var(--fg-3);}
  .bar{height:14px;background:var(--ocean-400);border-radius:2px;}
</style></head>
<body>
  <h4>Spacing — 4px base grid</h4>
  <div class="rows">
    <div class="r"><div class="k">space-1 · 4</div><div class="bar" style="width:4px"></div></div>
    <div class="r"><div class="k">space-2 · 8</div><div class="bar" style="width:8px"></div></div>
    <div class="r"><div class="k">space-3 · 12</div><div class="bar" style="width:12px"></div></div>
    <div class="r"><div class="k">space-4 · 16</div><div class="bar" style="width:16px"></div></div>
    <div class="r"><div class="k">space-6 · 24</div><div class="bar" style="width:24px"></div></div>
    <div class="r"><div class="k">space-8 · 32</div><div class="bar" style="width:32px"></div></div>
    <div class="r"><div class="k">space-12 · 48</div><div class="bar" style="width:48px"></div></div>
    <div class="r"><div class="k">space-16 · 64</div><div class="bar" style="width:64px"></div></div>
    <div class="r"><div class="k">space-20 · 80</div><div class="bar" style="width:80px"></div></div>
  </div>
</body></html>
