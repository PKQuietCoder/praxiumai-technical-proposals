<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:18px 22px;}
  .spec{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--grey-100);}
  .spec:last-child{border-bottom:0;}
  .name{flex:none;width:128px;font:var(--caption);color:var(--fg-3);}
  .ex{color:var(--fg-1);letter-spacing:-0.01em;}
</style></head>
<body>
  <div class="spec"><div class="name">display-01 · 44/600</div><div class="ex" style="font:var(--display-01)">Decarbonization</div></div>
  <div class="spec"><div class="name">display-02 · 36/600</div><div class="ex" style="font:var(--display-02)">Power & sensing</div></div>
  <div class="spec"><div class="name">display-03 · 28/600</div><div class="ex" style="font:var(--display-03)">AURIX™ microcontrollers</div></div>
  <div class="spec"><div class="name">display-04 · 22/600</div><div class="ex" style="font:var(--display-04)">Related products and solutions</div></div>
  <div class="spec"><div class="name">display-05 · 18/600</div><div class="ex" style="font:var(--display-05)">Documents &amp; resources</div></div>
</body></html>
