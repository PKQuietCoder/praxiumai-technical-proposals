<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--grey-50);color:var(--fg-1);padding:24px 22px;}
  h4{font:var(--overline);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 18px;}
  .grid{display:flex;gap:26px;}
  .item{text-align:center;}
  .box{width:120px;height:74px;background:#fff;border-radius:var(--radius-md);}
  .item span{display:block;font:var(--caption);color:var(--fg-3);margin-top:12px;}
</style></head>
<body>
  <h4>Elevation — subtle, cool-tinted</h4>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-1)"></div><span>shadow-1<br>cards, hairline lift</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-2)"></div><span>shadow-2<br>hover, sticky header</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-3)"></div><span>shadow-3<br>menus, popovers</span></div>
  </div>
</body></html>
