<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:18px 22px;}
  h4{font:var(--overline);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 4px;}
  .big{font-size:52px;font-weight:600;letter-spacing:-0.01em;line-height:1.05;margin:6px 0 14px;}
  .weights{display:flex;gap:28px;}
  .w span{display:block;font:var(--caption);color:var(--fg-3);margin-bottom:2px;}
  .w p{margin:0;font-size:22px;}
</style></head>
<body>
  <h4>Source Sans 3 — system typeface</h4>
  <div class="big">Aa Gg Rk 0123</div>
  <div class="weights">
    <div class="w"><span>Regular · 400</span><p style="font-weight:400">Engineering</p></div>
    <div class="w"><span>Semibold · 600</span><p style="font-weight:600">Engineering</p></div>
    <div class="w"><span>Bold · 700</span><p style="font-weight:700">Engineering</p></div>
    <div class="w"><span>Italic · 400</span><p style="font-weight:400;font-style:italic">Engineering</p></div>
  </div>
</body></html>
