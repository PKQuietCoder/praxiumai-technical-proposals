<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:20px 22px;}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{height:96px;border-radius:var(--radius-sm);box-shadow:var(--shadow-1);display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#fff;}
  .sw b{font:var(--label);} .sw small{font:var(--caption);opacity:.9;}
  h4{font:var(--overline);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px;}
</style></head>
<body>
  <h4>Secondary brand accents</h4>
  <div class="grid">
    <div class="sw" style="background:var(--engineering-blue)"><b>Engineering blue</b><small>#08266E</small></div>
    <div class="sw" style="background:var(--green)"><b>Green</b><small>#5A9E1B</small></div>
    <div class="sw" style="background:var(--orange);color:var(--fg-1)"><b>Orange</b><small>#FFB600</small></div>
    <div class="sw" style="background:var(--berry)"><b>Berry</b><small>#B0228C</small></div>
  </div>
</body></html>
