<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:20px 22px;}
  .row{display:flex;gap:0;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--grey-200);}
  .sw{flex:1;height:76px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 9px;}
  .sw span{font:var(--caption);font-weight:600;font-size:11px;} .sw small{font-size:9.5px;opacity:.8;}
  h4{font:var(--overline);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px;}
</style></head>
<body>
  <h4>Neutrals — cool grey scale</h4>
  <div class="row">
    <div class="sw" style="background:var(--white);color:var(--fg-1)"><span>White</span><small>#FFFFFF</small></div>
    <div class="sw" style="background:var(--grey-50);color:var(--fg-1)"><span>50</span><small>#F7F9FA</small></div>
    <div class="sw" style="background:var(--grey-100);color:var(--fg-1)"><span>100</span><small>#EDF1F2</small></div>
    <div class="sw" style="background:var(--grey-200);color:var(--fg-1)"><span>200</span><small>#DDE3E6</small></div>
    <div class="sw" style="background:var(--grey-300);color:var(--fg-1)"><span>300</span><small>#C5CDD1</small></div>
    <div class="sw" style="background:var(--grey-400);color:#fff"><span>400</span><small>#9AA5AB</small></div>
    <div class="sw" style="background:var(--grey-500);color:#fff"><span>500</span><small>#6B7780</small></div>
    <div class="sw" style="background:var(--grey-600);color:#fff"><span>600</span><small>#4A555C</small></div>
    <div class="sw" style="background:var(--grey-700);color:#fff"><span>700</span><small>#2E373D</small></div>
    <div class="sw" style="background:var(--grey-800);color:#fff"><span>800</span><small>#1B2226</small></div>
  </div>
</body></html>
