<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:20px 22px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;max-width:640px;}
  label{font:var(--label);display:block;margin-bottom:6px;}
  .field{display:flex;align-items:center;gap:8px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 11px;background:#fff;}
  .field svg{width:17px;height:17px;color:var(--fg-3);}
  .field input{border:0;outline:0;font:var(--body-02);flex:1;color:var(--fg-1);background:transparent;}
  .field.focus{border-color:var(--ocean-400);box-shadow:var(--shadow-focus);}
  .field.err{border-color:var(--error);}
  .hint{font:var(--caption);color:var(--fg-3);margin-top:5px;}
  .hint.err{color:var(--error);}
  select{width:100%;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 11px;font:var(--body-02);color:var(--fg-1);background:#fff;}
</style></head>
<body>
  <div class="grid">
    <div><label>Email</label><div class="field focus"><i data-lucide="mail"></i><input value="you@company.com"/></div><div class="hint">Default · focused</div></div>
    <div><label>Search products</label><div class="field"><i data-lucide="search"></i><input placeholder="e.g. CoolSiC™"/></div><div class="hint">Placeholder</div></div>
    <div><label>Part number</label><div class="field err"><i data-lucide="alert-circle"></i><input value="XYZ-000"/></div><div class="hint err">No product matches this part number.</div></div>
    <div><label>Market segment</label><select><option>Automotive</option><option>Industrial Power</option><option>Power &amp; Sensor Systems</option></select><div class="hint">Select</div></div>
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>lucide.createIcons();</script>
</body></html>
