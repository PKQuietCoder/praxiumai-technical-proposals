<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--white);color:var(--fg-1);padding:20px 22px;}
  .row{display:flex;gap:0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-1);}
  .sw{flex:1;height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;}
  .sw span{font:var(--caption);font-weight:600;}
  .sw small{font:var(--caption);font-size:10px;opacity:.85;}
  .lite{color:var(--fg-1);} .dark{color:#fff;}
  h4{font:var(--overline);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px;}
</style></head>
<body>
  <h4>Ocean — primary brand</h4>
  <div class="row">
    <div class="sw lite" style="background:var(--ocean-50)"><span>50</span><small>#E6F2F1</small></div>
    <div class="sw lite" style="background:var(--ocean-100)"><span>100</span><small>#C0DFDB</small></div>
    <div class="sw lite" style="background:var(--ocean-200)"><span>200</span><small>#84C2BA</small></div>
    <div class="sw dark" style="background:var(--ocean-300)"><span>300</span><small>#3FA197</small></div>
    <div class="sw dark" style="background:var(--ocean-400)"><span>400 · base</span><small>#0A8276</small></div>
    <div class="sw dark" style="background:var(--ocean-600)"><span>600 · hover</span><small>#086A60</small></div>
    <div class="sw dark" style="background:var(--ocean-700)"><span>700 · press</span><small>#06544C</small></div>
    <div class="sw dark" style="background:var(--ocean-800)"><span>800</span><small>#043F39</small></div>
  </div>
</body></html>
